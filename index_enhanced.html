<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirvana SR Ecosystem Proposal v4.0 - Enhanced</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #2ecc71;
            --light: #f8f9fa;
            --dark: #2c3e50;
            --warning: #e74c3c;
            --success: #27ae60;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #4a6491 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 0 0 20px 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L100,100 Z" fill="rgba(255,255,255,0.05)"/></svg>');
            background-size: cover;
        }
        
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        
        .subtitle {
            font-size: 1.8rem;
            opacity: 0.9;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        
        .nav-btn {
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 600;
        }
        
        .nav-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .meta {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 25px;
            position: relative;
            z-index: 1;
        }
        
        .meta-item {
            background: rgba(255,255,255,0.15);
            padding: 12px 24px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .confidential-banner {
            background: linear-gradient(135deg, var(--warning) 0%, #c0392b 100%);
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: 700;
            border-radius: 10px;
            margin: 30px 0;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }
        
        .content {
            margin-top: 40px;
        }
        
        .section {
            background: var(--light);
            padding: 40px;
            border-radius: 15px;
            border-left: 5px solid var(--secondary);
            margin-bottom: 40px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        
        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        
        h2 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(52, 152, 219, 0.2);
        }
        
        h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 40px;
            background: var(--secondary);
            border-radius: 4px;
        }
        
        h3 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h3::before {
            content: '•';
            color: var(--secondary);
            font-size: 1.8rem;
        }
        
        /* Market Analysis Styles */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        
        .market-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-top: 5px solid var(--secondary);
            transition: transform 0.3s ease;
        }
        
        .market-card:hover {
            transform: translateY(-8px);
        }
        
        .market-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 10px;
            line-height: 1;
        }
        
        .market-label {
            color: #7f8c8d;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .chart-placeholder {
            height: 200px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-weight: 600;
        }
        
        /* Financial Analysis Styles */
        .financial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        
        .financial-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .financial-card.positive {
            border-color: var(--success);
        }
        
        .financial-card.positive .financial-value {
            color: var(--success);
        }
        
        .financial-card.warning {
            border-color: var(--warning);
        }
        
        .financial-card.warning .financial-value {
            color: var(--warning);
        }
        
        .financial-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1;
        }
        
        .financial-label {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .financial-desc {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        /* Case Study Styles */
        .case-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        
        .case-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-left: 5px solid var(--accent);
        }
        
        .case-title {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .case-result {
            background: rgba(46, 204, 113, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid var(--accent);
        }
        
        /* Risk Management Styles */
        .risk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        
        .risk-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .risk-level {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .risk-level.high {
            background: rgba(231, 76, 60, 0.1);
            color: var(--warning);
        }
        
        .risk-level.medium {
            background: rgba(241, 196, 15, 0.1);
            color: #f39c12;
        }
        
        .risk-level.low {
            background: rgba(46, 204, 113, 0.1);
            color: var(--accent);
        }
        
        .mitigation-list {
            margin-top: 15px;
            padding-left: 20px;
        }
        
        .mitigation-list li {
            margin-bottom: 8px;
            color: #555;
        }
        
        /* Interactive Elements */
        .interactive-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin: 25px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 2px dashed var(--secondary);
        }
        
        .calculator {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .calc-input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .calc-input:focus {
            outline: none;
            border-color: var(--secondary);
        }
        
        .calc-result {
            background: rgba(52, 152, 219, 0.1);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        /* Side Navigation */
        .side-nav {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            display: none;
        }
        
        .nav-dot {
            display: block;
            width: 12px;
            height: 12px;
            background: #ddd;
            border-radius: 50%;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-dot.active {
            background: var(--secondary);
            transform: scale(1.3);
        }
        
        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: var(--secondary);
            z-index: 1001;
            transition: width 0.3s ease;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            margin-top: 60px;
            background: white;
            border-radius: 15px 15px 0 0;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--secondary) 0%, #2980b9 100%);
            color: white;
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
            border: none;
            cursor: pointer;
        }
        
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.6);
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .logo { font-size: 2.5rem; }
            .subtitle { font-size: 1.4rem; }
            .meta { flex-direction: column; align-items: center; }
            .meta-item { width: 100%; max-width: 300px; }
            .section { padding: 25px; }
            .side-nav { display: none; }
        }
        
        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section {
            animation: fadeIn 0.6s ease-out;
        }
        
        .market-card, .financial-card, .case-card, .risk-card {
            animation: fadeIn 0.8s ease-out;
        }
        
        /* Print Styles */
        @media print {
            .nav-links, .side-nav, .progress-bar, .download-btn {
                display: none;
            }
            .section {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar"></div>
    
    <!-- Side Navigation -->
    <div class="side-nav" id="sideNav">

        <a href="#market-analysis" class="nav-dot" data-section="market"></a>
        <a href="#financial-analysis" class="nav-dot" data-section="financial"></a>
        <a href="#technical-architecture" class="nav-dot" data-section="technical"></a>
        <a href="#implementation" class="nav-dot" data-section="
